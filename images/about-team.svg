<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="16" fill="url(#bg-grad)"/>
  <!-- Desk -->
  <rect x="60" y="200" width="380" height="10" rx="3" fill="#334155"/>
  <rect x="80" y="210" width="8" height="80" fill="#334155"/>
  <rect x="412" y="210" width="8" height="80" fill="#334155"/>
  <!-- Monitor -->
  <rect x="160" y="120" width="180" height="80" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <rect x="170" y="130" width="160" height="55" rx="2" fill="#0f172a"/>
  <!-- Code lines on monitor -->
  <rect x="180" y="140" width="60" height="4" rx="2" fill="#3b82f6" opacity="0.7"/>
  <rect x="180" y="150" width="100" height="4" rx="2" fill="#60a5fa" opacity="0.5"/>
  <rect x="180" y="160" width="40" height="4" rx="2" fill="#8b5cf6" opacity="0.6"/>
  <rect x="180" y="170" width="80" height="4" rx="2" fill="#3b82f6" opacity="0.4"/>
  <!-- Monitor stand -->
  <rect x="235" y="200" width="30" height="5" fill="#334155"/>
  <!-- Person 1 -->
  <circle cx="140" cy="160" r="18" fill="#3b82f6" opacity="0.3"/>
  <circle cx="140" cy="152" r="10" fill="#60a5fa"/>
  <rect x="126" y="166" width="28" height="35" rx="8" fill="#3b82f6"/>
  <!-- Person 2 -->
  <circle cx="360" cy="160" r="18" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="360" cy="152" r="10" fill="#8b5cf6"/>
  <rect x="346" y="166" width="28" height="35" rx="8" fill="#8b5cf6" opacity="0.8"/>
  <!-- Neural network decoration -->
  <circle cx="80" cy="60" r="4" fill="#3b82f6" opacity="0.3"/>
  <circle cx="120" cy="40" r="3" fill="#60a5fa" opacity="0.3"/>
  <circle cx="400" cy="50" r="5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="430" cy="80" r="3" fill="#3b82f6" opacity="0.2"/>
  <line x1="80" y1="60" x2="120" y2="40" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <line x1="400" y1="50" x2="430" y2="80" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
</svg>
